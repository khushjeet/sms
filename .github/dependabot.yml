version: 2
updates:
  - package-ecosystem: composer
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "05:00"
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - php

  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "05:20"
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - frontend

  - package-ecosystem: npm
    directory: "/frontend"
    schedule:
      interval: weekly
      day: monday
      time: "05:40"
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - frontend
