name: Durability Audit

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1"

jobs:
  durability-audit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run durability audit
        shell: pwsh
        run: ./scripts/durability-audit.ps1 -Strict
