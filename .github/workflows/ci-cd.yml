name: CI/CD

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          extensions: pdo_mysql, pdo_sqlite, mbstring, bcmath
          coverage: none

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: |
            package-lock.json
            frontend/package-lock.json

      - name: Prepare Laravel env
        run: cp .env.example .env

      - name: Install Composer dependencies
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Generate app key
        run: php artisan key:generate

      - name: Run backend tests
        run: php artisan test --stop-on-failure

      - name: Build Laravel Vite assets
        run: |
          npm ci
          npm run build

      - name: Build Angular frontend
        run: |
          npm ci --prefix frontend
          npm run build --prefix frontend

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: test-and-build
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script_stop: true
          script: |
            set -e
            cd ${{ secrets.APP_PATH }}
            git fetch --all
            git reset --hard origin/main
            composer install --no-interaction --no-dev --prefer-dist --optimize-autoloader
            php artisan migrate --force
            npm ci
            npm run build
            npm ci --prefix frontend
            npm run build --prefix frontend
            FRONTEND_BUILD_DIR="frontend/dist/frontend"
            if [ -d "frontend/dist/frontend/browser" ]; then
              FRONTEND_BUILD_DIR="frontend/dist/frontend/browser"
            fi
            if [ -n "${{ secrets.FRONTEND_PATH }}" ]; then
              mkdir -p "${{ secrets.FRONTEND_PATH }}"
              rm -rf "${{ secrets.FRONTEND_PATH }}"/*
              cp -r "${FRONTEND_BUILD_DIR}/." "${{ secrets.FRONTEND_PATH }}/"
            fi
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
