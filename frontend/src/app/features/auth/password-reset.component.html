<div class="password-reset">
  <div class="password-reset__panel">
    <p class="password-reset__eyebrow">School Management System</p>
    <h1>Reset password</h1>
    <p class="password-reset__sub">Create a new password for your teacher or super admin account.</p>

    <form [formGroup]="form" (ngSubmit)="submit()" class="password-reset__form">
      <label>
        <span>Email</span>
        <input type="email" formControlName="email" placeholder="you@school.com" />
      </label>

      <label>
        <span>New password</span>
        <input type="password" formControlName="password" placeholder="Minimum 8 characters" />
      </label>

      <label>
        <span>Confirm password</span>
        <input type="password" formControlName="password_confirmation" placeholder="Re-enter password" />
      </label>

      <p class="password-reset__error" *ngIf="error()">{{ error() }}</p>
      <p class="password-reset__success" *ngIf="success()">{{ success() }}</p>

      <button type="submit" [disabled]="loading()">
        {{ loading() ? 'Resetting...' : 'Reset password' }}
      </button>
    </form>

    <a routerLink="/login" class="password-reset__back">Back to sign in</a>
  </div>
</div>
